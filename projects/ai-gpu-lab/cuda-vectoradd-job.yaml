apiVersion: batch/v1
kind: Job
metadata:
  name: cuda-vectoradd
  namespace: ai-gpu-lab
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cuda-vectoradd
        app.kubernetes.io/part-of: openshift-ai-lab
    spec:
      restartPolicy: OnFailure
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: cuda-vectoradd
          image: nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0-ubi8
          resources:
            limits:
              nvidia.com/gpu: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
