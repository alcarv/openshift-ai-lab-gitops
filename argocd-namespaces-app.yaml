apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-ai-lab
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: 'https://github.com/alcarv/openshift-ai-lab-gitops.git'
    targetRevision: main
    path: apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 20
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
